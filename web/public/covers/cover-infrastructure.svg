<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg" cx="80%" cy="85%" r="70%">
      <stop offset="0%" stop-color="#f43f5e" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#f43f5e" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="#0a0a0c"/>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Logo mark -->
  <rect x="48" y="44" width="40" height="40" rx="9" fill="#ffffff"/>
  <circle cx="68" cy="64" r="9" fill="#0a0a0c"/>
  <!-- Logo text -->
  <text x="100" y="72" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="20" font-weight="600" fill="#ffffff" opacity="0.9" letter-spacing="-0.3">Clawbrowser</text>
  <!-- Decorative: grid/network pattern -->
  <line x1="300" y1="150" x2="300" y2="480" stroke="#f43f5e" stroke-width="1" opacity="0.2"/>
  <line x1="450" y1="150" x2="450" y2="480" stroke="#f43f5e" stroke-width="1" opacity="0.2"/>
  <line x1="600" y1="150" x2="600" y2="480" stroke="#f43f5e" stroke-width="1" opacity="0.2"/>
  <line x1="750" y1="150" x2="750" y2="480" stroke="#f43f5e" stroke-width="1" opacity="0.2"/>
  <line x1="900" y1="150" x2="900" y2="480" stroke="#f43f5e" stroke-width="1" opacity="0.2"/>
  <line x1="300" y1="200" x2="900" y2="200" stroke="#f43f5e" stroke-width="1" opacity="0.2"/>
  <line x1="300" y1="315" x2="900" y2="315" stroke="#f43f5e" stroke-width="1" opacity="0.2"/>
  <line x1="300" y1="430" x2="900" y2="430" stroke="#f43f5e" stroke-width="1" opacity="0.2"/>
  <!-- Node dots at intersections -->
  <circle cx="300" cy="200" r="5" fill="#f43f5e" opacity="0.5"/>
  <circle cx="450" cy="200" r="5" fill="#f43f5e" opacity="0.4"/>
  <circle cx="600" cy="200" r="6" fill="#fb7185" opacity="0.6"/>
  <circle cx="750" cy="200" r="5" fill="#f43f5e" opacity="0.4"/>
  <circle cx="900" cy="200" r="5" fill="#f43f5e" opacity="0.5"/>
  <circle cx="300" cy="315" r="5" fill="#f43f5e" opacity="0.4"/>
  <circle cx="450" cy="315" r="7" fill="#fb7185" opacity="0.65"/>
  <circle cx="600" cy="315" r="8" fill="#fb7185" opacity="0.75"/>
  <circle cx="750" cy="315" r="7" fill="#fb7185" opacity="0.65"/>
  <circle cx="900" cy="315" r="5" fill="#f43f5e" opacity="0.4"/>
  <circle cx="300" cy="430" r="5" fill="#f43f5e" opacity="0.5"/>
  <circle cx="450" cy="430" r="5" fill="#f43f5e" opacity="0.4"/>
  <circle cx="600" cy="430" r="6" fill="#fb7185" opacity="0.6"/>
  <circle cx="750" cy="430" r="5" fill="#f43f5e" opacity="0.4"/>
  <circle cx="900" cy="430" r="5" fill="#f43f5e" opacity="0.5"/>
  <!-- Grid -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#ffffff" stroke-width="0.5" opacity="0.04"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#ffffff" stroke-width="0.5" opacity="0.04"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#ffffff" stroke-width="0.5" opacity="0.04"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#ffffff" stroke-width="0.5" opacity="0.04"/>
</svg>
