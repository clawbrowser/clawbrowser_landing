  <path d="M 600 315 m -30 0 a 30 30 0 0 1 60 0" fill="none" stroke="#a78bfa" stroke-width="2.5" opacity="0.65"/>
  <path d="M 600 315 m -150 0 a 150 150 0 0 1 300 0" fill="none" stroke="#7c3aed" stroke-width="1.5" opacity="0.35"/>
  <path d="M 600 315 m -180 0 a 180 180 0 0 1 360 0" fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.2"/>
  <circle cx="600" cy="315" r="8" fill="#a78bfa" opacity="0.8"/>
  <!-- Grid -->
